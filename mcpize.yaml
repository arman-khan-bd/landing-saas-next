# MCPize manifest - https://mcpize.com
# Generated by mcpize analyze
version: 1
name: nextn
runtime: typescript
entry: dist/index.js
build:
  install: npm install
  command: npm ci && npm run build
startCommand:
  type: http
  command: node dist/index.js
credentials:
  - name: SMS_API_KEY
    required: false
    description: API key for SMS service provider.
    mapping:
      env: SMS_API_KEY
      header: X-MCP-Sms-Api-Key
  - name: NEXT_PUBLIC_SMS_API_KEY
    required: false
    description: Publicly exposed API key for SMS service.
    mapping:
      env: NEXT_PUBLIC_SMS_API_KEY
      header: X-MCP-Next-Public-Sms-Api-Key
  - name: NEXT_PUBLIC_FACEBOOK_PIXEL_ID
    required: true
    description: Facebook Pixel ID for website analytics and tracking.
    docs_url: 'https://developers.facebook.com/docs/meta-pixel/'
    mapping:
      env: NEXT_PUBLIC_FACEBOOK_PIXEL_ID
      header: X-MCP-Next-Public-Facebook-Pixel-Id
credentials_mode: per_user
